<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requirements Linker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Requirements Linker</h1>
    <p>Drag a paragraph from the left into one or more paragraphs on the right to create links.</p>

    <div class="toolbar">
      <button id="resetLinks">Clear links</button>
      <button class="secondary" id="exportLinks">Copy links as JSON</button>
      <span class="muted" id="status">0 links</span>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Document A</h2>
        <div class="input-area">
          <textarea id="inputA" placeholder="Paste Document A here. Use blank lines or new lines between paragraphs."></textarea>
          <div class="input-actions">
            <button class="secondary" id="loadA">Load Document A</button>
            <button class="secondary" id="pasteA">Paste from clipboard</button>
            <label class="file">
              Upload file
              <input type="file" id="fileA" accept=".txt" />
            </label>
          </div>
        </div>
        <div class="list" id="docA"></div>
      </section>

      <div class="canvas-wrap">
        <svg id="linkCanvas"></svg>
      </div>

      <section class="panel">
        <h2>Document B</h2>
        <div class="input-area">
          <textarea id="inputB" placeholder="Paste Document B here. Use blank lines or new lines between paragraphs."></textarea>
          <div class="input-actions">
            <button class="secondary" id="loadB">Load Document B</button>
            <button class="secondary" id="pasteB">Paste from clipboard</button>
            <label class="file">
              Upload file
              <input type="file" id="fileB" accept=".txt" />
            </label>
          </div>
        </div>
        <div class="list" id="docB"></div>
      </section>
    </div>

    <section class="panel links-list">
      <h3>Links</h3>
      <ul id="linksList"></ul>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
