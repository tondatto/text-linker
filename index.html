<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requirements Linker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f6f7fb;
        color: #1d2330;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        color: #4b5565;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 60px minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: #ffffff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .panel h2 {
        font-size: 16px;
        margin: 0 0 12px;
        color: #1f2937;
      }

      .input-area {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px;
        font-size: 13px;
        resize: vertical;
      }

      .input-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .file {
        background: #e2e8f0;
        color: #1f2937;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13px;
      }

      .file input {
        display: none;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .item {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        cursor: grab;
        position: relative;
      }

      .item.dragging {
        opacity: 0.5;
      }

      .item strong {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 6px;
        letter-spacing: 0.04em;
      }

      .item .text {
        font-size: 14px;
        line-height: 1.4;
      }

      .drop-target {
        outline: 2px solid transparent;
      }

      .drop-target.active {
        outline-color: #2563eb;
        background: #eff6ff;
      }

      .canvas-wrap {
        display: flex;
        align-items: stretch;
        justify-content: center;
        position: relative;
      }

      svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      button {
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13px;
      }

      button.secondary {
        background: #e2e8f0;
        color: #1f2937;
      }

      .links-list {
        margin-top: 16px;
      }

      .links-list h3 {
        font-size: 14px;
        margin: 0 0 8px;
        color: #1f2937;
      }

      .links-list ul {
        margin: 0;
        padding-left: 18px;
        color: #475569;
        font-size: 13px;
      }

      .muted {
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <h1>Requirements Linker</h1>
    <p>Drag a paragraph from the left into one or more paragraphs on the right to create links.</p>

    <div class="toolbar">
      <button id="resetLinks">Clear links</button>
      <button class="secondary" id="exportLinks">Copy links as JSON</button>
      <span class="muted" id="status">0 links</span>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Document A</h2>
        <div class="input-area">
          <textarea id="inputA" placeholder="Paste Document A here. Use blank lines or new lines between paragraphs."></textarea>
          <div class="input-actions">
            <button class="secondary" id="loadA">Load Document A</button>
            <button class="secondary" id="pasteA">Paste from clipboard</button>
            <label class="file">
              Upload file
              <input type="file" id="fileA" accept=".txt" />
            </label>
          </div>
        </div>
        <div class="list" id="docA"></div>
      </section>

      <div class="canvas-wrap">
        <svg id="linkCanvas"></svg>
      </div>

      <section class="panel">
        <h2>Document B</h2>
        <div class="input-area">
          <textarea id="inputB" placeholder="Paste Document B here. Use blank lines or new lines between paragraphs."></textarea>
          <div class="input-actions">
            <button class="secondary" id="loadB">Load Document B</button>
            <button class="secondary" id="pasteB">Paste from clipboard</button>
            <label class="file">
              Upload file
              <input type="file" id="fileB" accept=".txt" />
            </label>
          </div>
        </div>
        <div class="list" id="docB"></div>
      </section>
    </div>

    <section class="panel links-list">
      <h3>Links</h3>
      <ul id="linksList"></ul>
    </section>

    <script>
      let dataA = [
        "Allow registering works or services tied to a contract, with details.",
        "Allow location info with road, segment, and coordinates.",
        "Allow linking a work/service to a project module.",
        "Allow automatic import of infrastructure assets.",
        "Block edits to imported assets except key fields.",
        "Allow reporting initial execution deadline.",
      ];

      let dataB = [
        "Allow registering works/services linked to contracts with type and classification.",
        "Allow registering location via road and coordinates.",
        "Allow linking work/service to a project module or management module.",
        "Allow automatic import of infrastructure assets from the project.",
        "Block edits to imported assets, preserve integrity.",
        "Allow filtering classifications based on selected work type.",
        "Allow registering continuation between works.",
      ];

      const docA = document.getElementById("docA");
      const docB = document.getElementById("docB");
      const inputA = document.getElementById("inputA");
      const inputB = document.getElementById("inputB");
      const linkCanvas = document.getElementById("linkCanvas");
      const linksList = document.getElementById("linksList");
      const status = document.getElementById("status");
      const links = [];

      const parseText = (text) => {
        const trimmed = text.trim();
        if (!trimmed) return [];
        let parts = trimmed.split(/\n\s*\n/).map((part) => part.trim()).filter(Boolean);
        if (parts.length <= 1) {
          parts = trimmed.split(/\n+/).map((part) => part.trim()).filter(Boolean);
        }
        return parts;
      };

      const setData = (side, list) => {
        if (side === "a") {
          dataA = list;
          renderList(docA, dataA, "a");
        } else {
          dataB = list;
          renderList(docB, dataB, "b");
        }
        links.length = 0;
        renderLinks();
      };

      const loadFromInput = (side) => {
        const input = side === "a" ? inputA : inputB;
        const list = parseText(input.value);
        setData(side, list);
      };

      const readFile = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsText(file);
        });

      const renderList = (container, items, prefix) => {
        container.innerHTML = "";
        items.forEach((text, index) => {
          const item = document.createElement("div");
          item.className = "item drop-target";
          item.dataset.id = `${prefix}-${index}`;
          item.innerHTML = `<strong>${prefix.toUpperCase()} ${index + 1}</strong><div class="text">${text}</div>`;
          if (prefix === "a") {
            item.draggable = true;
            item.addEventListener("dragstart", (event) => {
              event.dataTransfer.setData("text/plain", item.dataset.id);
              item.classList.add("dragging");
            });
            item.addEventListener("dragend", () => item.classList.remove("dragging"));
          } else {
            item.addEventListener("dragover", (event) => {
              event.preventDefault();
              item.classList.add("active");
            });
            item.addEventListener("dragleave", () => item.classList.remove("active"));
            item.addEventListener("drop", (event) => {
              event.preventDefault();
              item.classList.remove("active");
              const sourceId = event.dataTransfer.getData("text/plain");
              if (!sourceId) return;
              addLink(sourceId, item.dataset.id);
            });
          }
          container.appendChild(item);
        });
      };

      const addLink = (fromId, toId) => {
        if (links.some((link) => link.from === fromId && link.to === toId)) return;
        links.push({ from: fromId, to: toId });
        renderLinks();
      };

      const renderLinks = () => {
        linksList.innerHTML = "";
        linkCanvas.innerHTML = "";
        links.forEach((link) => {
          const fromEl = document.querySelector(`[data-id="${link.from}"]`);
          const toEl = document.querySelector(`[data-id="${link.to}"]`);
          if (!fromEl || !toEl) return;
          const fromRect = fromEl.getBoundingClientRect();
          const toRect = toEl.getBoundingClientRect();
          const canvasRect = linkCanvas.getBoundingClientRect();
          const x1 = fromRect.right - canvasRect.left;
          const y1 = fromRect.top + fromRect.height / 2 - canvasRect.top;
          const x2 = toRect.left - canvasRect.left;
          const y2 = toRect.top + toRect.height / 2 - canvasRect.top;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const dx = (x2 - x1) / 2;
          path.setAttribute("d", `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
          path.setAttribute("stroke", "#2563eb");
          path.setAttribute("stroke-width", "2");
          path.setAttribute("fill", "none");
          linkCanvas.appendChild(path);

          const li = document.createElement("li");
          li.textContent = `${link.from.toUpperCase()} → ${link.to.toUpperCase()}`;
          linksList.appendChild(li);
        });
        status.textContent = `${links.length} links`;
      };

      document.getElementById("resetLinks").addEventListener("click", () => {
        links.length = 0;
        renderLinks();
      });

      document.getElementById("exportLinks").addEventListener("click", async () => {
        const payload = links.map((link) => ({
          from: link.from,
          to: link.to,
          fromText: dataA[Number(link.from.split("-")[1])],
          toText: dataB[Number(link.to.split("-")[1])],
        }));
        await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
        status.textContent = "Copied JSON to clipboard";
        setTimeout(() => {
          status.textContent = `${links.length} links`;
        }, 2000);
      });

      document.getElementById("loadA").addEventListener("click", () => loadFromInput("a"));
      document.getElementById("loadB").addEventListener("click", () => loadFromInput("b"));

      document.getElementById("pasteA").addEventListener("click", async () => {
        const text = await navigator.clipboard.readText();
        inputA.value = text;
        loadFromInput("a");
      });

      document.getElementById("pasteB").addEventListener("click", async () => {
        const text = await navigator.clipboard.readText();
        inputB.value = text;
        loadFromInput("b");
      });

      document.getElementById("fileA").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const text = await readFile(file);
        inputA.value = text;
        loadFromInput("a");
      });

      document.getElementById("fileB").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const text = await readFile(file);
        inputB.value = text;
        loadFromInput("b");
      });

      window.addEventListener("resize", renderLinks);

      renderList(docA, dataA, "a");
      renderList(docB, dataB, "b");
      renderLinks();
    </script>
  </body>
</html>
